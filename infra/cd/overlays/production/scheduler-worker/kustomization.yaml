apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cogni-production

resources:
  - ../namespace.yaml
  - ../../base/scheduler-worker

# Image digest — update this on promotion (IMAGE_IMMUTABILITY invariant)
images:
  - name: ghcr.io/cogni-dao/cogni-template
    newName: ghcr.io/cogni-dao/cogni-template
    # Replace with @sha256: digest on first real deployment
    newTag: "production-placeholder-scheduler-worker"

patches:
  # Patch ConfigMap with production-specific values
  - target:
      kind: ConfigMap
      name: scheduler-worker-config
    patch: |
      - op: replace
        path: /data/TEMPORAL_NAMESPACE
        value: "cogni-production"
      - op: replace
        path: /data/APP_BASE_URL
        value: "http://app:3000"
      - op: replace
        path: /data/IMAGE_DIGEST
        value: "production-placeholder-scheduler-worker"
