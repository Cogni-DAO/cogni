#
# Selectorless Services + EndpointSlices for same-host connectivity.
# scheduler-worker runs in k3s while Temporal, Postgres, and App remain in
# Docker Compose on the same VM. These resources let the pod reach them via
# standard K8s DNS (e.g., "temporal", "postgres", "app").
#
# Uses loopback EndpointSlices (127.0.0.1), so no cross-VM networking rules.
# Remove these resources when each dependency migrates to k3s.
#
# Pattern: Selectorless Service + EndpointSlice (K8s v1.33+ recommended).
# See: https://kubernetes.io/docs/concepts/services-networking/endpoint-slices/

# --- Temporal (gRPC) ---
apiVersion: v1
kind: Service
metadata:
  name: temporal
spec:
  ports:
    - port: 7233
      protocol: TCP
      name: grpc
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: temporal-1
  labels:
    kubernetes.io/service-name: temporal
addressType: IPv4
endpoints:
  - addresses:
      - "127.0.0.1"
ports:
  - port: 7233
    protocol: TCP
    name: grpc

---
# --- PostgreSQL ---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  ports:
    - port: 5432
      protocol: TCP
      name: postgres
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: postgres-1
  labels:
    kubernetes.io/service-name: postgres
addressType: IPv4
endpoints:
  - addresses:
      - "127.0.0.1"
ports:
  - port: 5432
    protocol: TCP
    name: postgres

---
# --- App (HTTP) ---
apiVersion: v1
kind: Service
metadata:
  name: app
spec:
  ports:
    - port: 3000
      protocol: TCP
      name: http
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: app-1
  labels:
    kubernetes.io/service-name: app
addressType: IPv4
endpoints:
  - addresses:
      - "127.0.0.1"
ports:
  - port: 3000
    protocol: TCP
    name: http
