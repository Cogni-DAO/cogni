#
# Argo CD non-HA install for single-node k3s with ksops secret decryption.
# Applied during cluster bootstrap, not by Argo itself.
#
# Usage:
#   kubectl create namespace argocd
#   kubectl kustomize infra/k8s/argocd/ | kubectl apply -n argocd -f -
#
# bug.5009: per-env *-applicationset.yaml files are intentionally NOT listed
# in `resources:`. Each cluster (candidate-a / preview / production) must
# reconcile only ITS OWN ApplicationSet. Per-env application happens via
# scripts/setup/provision-test-vm.sh, .github/workflows/candidate-flight.yml,
# and .github/workflows/promote-and-deploy.yml — those `kubectl apply` the
# single matching `<env>-applicationset.yaml`. Bundling all three here let a
# manual `kubectl kustomize | kubectl apply` (e.g. the bug.0312 recovery
# handoff) shadow-install preview + production ApplicationSets onto
# candidate-a, which then synced cogni-preview/cogni-production namespaces
# in-cluster. Keep the per-env files in this directory; do not re-add them
# to `resources:`.
#
# Pin to a specific release for reproducibility:
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  # Pin to Argo CD v2.13 (latest stable as of 2026-03).
  # Non-HA is appropriate for single-node k3s crawl; HA is a P2 concern.
  - https://raw.githubusercontent.com/argoproj/argo-cd/v2.13.4/manifests/install.yaml
  # ksops CMP plugin ConfigMap
  - ksops-cmp.yaml

patches:
  # Add ksops sidecar to repo-server for SOPS/age secret decryption
  - path: repo-server-patch.yaml
  # 30s reconciliation for fast dev iteration (default is 180s)
  - path: argocd-cm-patch.yaml
