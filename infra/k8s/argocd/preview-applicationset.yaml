#
# ApplicationSet for preview environment.
# Human e2e testing. Promoted from main after candidate-a flight passes.
#
# task.0320 — per-node preview flighting. Each node has its own deploy
# branch (deploy/preview-<node>, declared in infra/catalog/<node>.yaml
# as preview_branch) so one node's failed verify cannot block another
# node's lane. Argo's git generator applies one revision to all matched
# files, so per-node revisions require one git generator per node —
# four git generators under one ApplicationSet.
#
# Applications produced (names unchanged vs. pre-task.0320 shape):
#   preview-operator          tracking deploy/preview-operator
#   preview-poly              tracking deploy/preview-poly
#   preview-resy              tracking deploy/preview-resy
#   preview-scheduler-worker  tracking deploy/preview-scheduler-worker
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cogni-preview
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/cogni-dao/cogni-template.git
        revision: deploy/preview-operator
        files:
          - path: "infra/catalog/operator.yaml"
    - git:
        repoURL: https://github.com/cogni-dao/cogni-template.git
        revision: deploy/preview-poly
        files:
          - path: "infra/catalog/poly.yaml"
    - git:
        repoURL: https://github.com/cogni-dao/cogni-template.git
        revision: deploy/preview-resy
        files:
          - path: "infra/catalog/resy.yaml"
    - git:
        repoURL: https://github.com/cogni-dao/cogni-template.git
        revision: deploy/preview-scheduler-worker
        files:
          - path: "infra/catalog/scheduler-worker.yaml"
  template:
    metadata:
      name: "preview-{{name}}"
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: https://github.com/cogni-dao/cogni-template.git
        targetRevision: "{{preview_branch}}"
        path: "infra/k8s/overlays/preview/{{name}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: cogni-preview
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
