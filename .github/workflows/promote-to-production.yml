name: Promote to Production

# Human-initiated production promotion. Opens a review PR from preview state
# into deploy/production. Merging that PR triggers promote-and-deploy.yml via
# its on:push:deploy/production hook. See docs/spec/ci-cd.md (Main Lane).

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}

      - name: Open promotion PR from preview state → deploy/production
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}
        run: |
          bash scripts/ci/promote-to-production.sh \
            "${{ github.repository }}" \
            "$GH_TOKEN"
