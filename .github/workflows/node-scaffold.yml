#
# node-scaffold.yml — emit a full node-app PR, authored by the operator GitHub App.
#
# task.5092 — the wizard's emit path. A node is ~1100 files; you can't Octokit
# them. So the operator DISPATCHES this workflow (as the App, the same mechanism
# as candidate-flight) and it runs the reproducible bash scaffold
# (scripts/setup/scaffold-node.sh) + the catalog-derived gens, then opens the PR
# under the operator App installation token (author = the App, auditable — not
# github-actions[bot], not a human PAT).
#
# Standalone-testable: dispatch by hand with the inputs below before the operator
# wiring (slice 2) lands.
name: Node Scaffold

on:
  workflow_dispatch:
    inputs:
      slug:
        description: "Node slug (kebab, 2-32 chars, not reserved)"
        required: true
        type: string
      node_id:
        description: "Node UUID (operator-minted; identity SSOT)"
        required: true
        type: string
      dao_contract:
        description: "DAO contract address (0x + 40 hex)"
        required: false
        type: string
        default: ""
      plugin_contract:
        description: "TokenVoting plugin address (0x + 40 hex)"
        required: false
        type: string
        default: ""
      signal_contract:
        description: "CogniSignal address (0x + 40 hex)"
        required: false
        type: string
        default: ""
      chain_id:
        description: "EVM chain id"
        required: false
        type: string
        default: "8453"

permissions:
  contents: read # PR/branch writes use the App installation token, not GITHUB_TOKEN

concurrency:
  group: node-scaffold-${{ inputs.slug }}
  cancel-in-progress: false

jobs:
  scaffold:
    runs-on: ubuntu-latest
    env:
      # All user-controlled inputs flow through env — NEVER inline ${{ }} in run:
      # blocks (shell-injection guard). Re-validated below before any use.
      SLUG: ${{ inputs.slug }}
      NODE_ID: ${{ inputs.node_id }}
      DAO_CONTRACT: ${{ inputs.dao_contract }}
      PLUGIN_CONTRACT: ${{ inputs.plugin_contract }}
      SIGNAL_CONTRACT: ${{ inputs.signal_contract }}
      CHAIN_ID: ${{ inputs.chain_id }}
      GH_APP_ID: ${{ secrets.GH_REVIEW_APP_ID }}
      GH_APP_PRIVATE_KEY_BASE64: ${{ secrets.GH_REVIEW_APP_PRIVATE_KEY_BASE64 }}
    steps:
      - name: Validate inputs (defence-in-depth; operator validates too)
        run: |
          set -euo pipefail
          [[ "$SLUG" =~ ^[a-z][a-z0-9-]{1,31}$ ]] || { echo "::error::invalid slug"; exit 1; }
          case "$SLUG" in operator|resy|node-template|poly|canary) echo "::error::reserved slug"; exit 1;; esac
          [[ "$NODE_ID" =~ ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$ ]] || { echo "::error::invalid node_id"; exit 1; }
          for a in "$DAO_CONTRACT" "$PLUGIN_CONTRACT" "$SIGNAL_CONTRACT"; do
            [ -z "$a" ] || [[ "$a" =~ ^0x[0-9a-fA-F]{40}$ ]] || { echo "::error::invalid address $a"; exit 1; }
          done
          [[ "$CHAIN_ID" =~ ^[0-9]+$ ]] || { echo "::error::invalid chain_id"; exit 1; }

      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
      - uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Scaffold node + derived footprint
        run: |
          set -euo pipefail
          # node_port auto-allocated (next-free-node-port.sh); port 3200 = clone bind port.
          bash scripts/setup/scaffold-node.sh "$SLUG" 3200 "" "$NODE_ID"

          # scope_id stopgap — scaffold-node.sh does NOT recompute it (it inherits
          # node-template's, which mis-scopes the ledger → /readyz 503). Recompute
          # = uuidv5(node_id,'default'). TODO: fold into scaffold-node.sh (task.5103 finding).
          SID="$(python3 -c "import uuid,os; print(uuid.uuid5(uuid.UUID(os.environ['NODE_ID']),'default'))")"
          spec="nodes/$SLUG/.cogni/repo-spec.yaml"
          perl -0pi -e "s/^scope_id: .*/scope_id: \"$SID\"/m" "$spec"
          # Write formed DAO addresses (env-driven; perl reads from %ENV, no shell interp).
          [ -n "$DAO_CONTRACT" ]    && perl -0pi -e 's/^(\s*dao_contract:).*/$1 "$ENV{DAO_CONTRACT}"/m'       "$spec" || true
          [ -n "$PLUGIN_CONTRACT" ] && perl -0pi -e 's/^(\s*plugin_contract:).*/$1 "$ENV{PLUGIN_CONTRACT}"/m' "$spec" || true
          [ -n "$SIGNAL_CONTRACT" ] && perl -0pi -e 's/^(\s*signal_contract:).*/$1 "$ENV{SIGNAL_CONTRACT}"/m' "$spec" || true
          perl -0pi -e 's/^(\s*chain_id:).*/$1 "$ENV{CHAIN_ID}"/m' "$spec"

          pnpm gen:scope-filters
          pnpm gen:caddyfile
          pnpm gen:scheduler-worker-endpoints
          pnpm install --lockfile-only

      - name: Mint operator App installation token
        id: token
        run: |
          set -euo pipefail
          pem="$(mktemp)"; printf '%s' "$GH_APP_PRIVATE_KEY_BASE64" | base64 -d > "$pem"
          b64url() { openssl base64 -A | tr '+/' '-_' | tr -d '='; }
          now=$(date +%s)
          header=$(printf '{"alg":"RS256","typ":"JWT"}' | b64url)
          payload=$(printf '{"iat":%d,"exp":%d,"iss":"%s"}' "$((now-60))" "$((now+540))" "$GH_APP_ID" | b64url)
          sig=$(printf '%s.%s' "$header" "$payload" | openssl dgst -sha256 -sign "$pem" -binary | b64url)
          jwt="$header.$payload.$sig"
          inst=$(curl -fsS -H "Authorization: Bearer $jwt" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/installation" | jq -r .id)
          tok=$(curl -fsS -X POST -H "Authorization: Bearer $jwt" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/app/installations/${inst}/access_tokens" | jq -r .token)
          echo "::add-mask::$tok"
          echo "token=$tok" >> "$GITHUB_OUTPUT"
          rm -f "$pem"

      - name: Commit + open PR as the operator App
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          set -euo pipefail
          branch="cogni-operator/node-bootstrap-${SLUG}"
          git config user.name "cogni-operator[bot]"
          git config user.email "cogni-operator[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add -A
          git commit -m "cogni-operator: scaffold node '${SLUG}' (task.5092)"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push -u origin "$branch" --force-with-lease
          gh pr create --base main --head "$branch" \
            --title "cogni-operator: scaffold node '${SLUG}'" \
            --body "Opened by the Cogni operator node wizard (node-scaffold.yml). Full node-app footprint: nodes/${SLUG}/** + catalog + overlays×3 + AppSet×3 (catalog-derived). node_id ${NODE_ID}. Review + flight to candidate-a."
          echo "PR_URL=$(gh pr view "$branch" --json url -q .url)" >> "$GITHUB_STEP_SUMMARY"
