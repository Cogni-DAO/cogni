name: Fork PR Build

# FORK_FREEDOM build lane (the missing half of #1516).
#
# Why this exists: a fork PR's `pull_request` event runs `pr-build.yml` with a
# READ-ONLY GITHUB_TOKEN and no secrets (GitHub's fork-PR security model), so
# `pr-build.yml`'s `resolve` job deliberately skips build/manifest for forks
# (`head.repo.full_name == github.repository`). No image is built → the fork's
# code can never flight to candidate-a → external agents (flock-leader, pull-only
# on GitHub) can't get their code validated. That is the one blocker to a fully
# CICD-driven external-contributor path.
#
# What it does: an OPERATOR-APPROVED, TRUSTED-CONTEXT build of the fork's HEAD.
# It runs `workflow_dispatch` in the BASE repo (Cogni-DAO/cogni) — so it has a
# writable GITHUB_TOKEN with `packages: write` — checks out the fork's
# `{head_repo}@{head_sha}`, and builds+pushes the SAME `pr-{N}-{sha}` images to
# `ghcr.io/<owner>/cogni-template` that `candidate-flight.yml` already resolves.
# It reuses `detect-affected.sh` + `build-and-push-images.sh` + `image-tags.sh`
# unchanged — no hand-rolled target lists, no new tag convention.
#
# Security: this is dispatch-ONLY (never auto-runs on fork push — no pwn-request
# / pull_request_target on fork code). It is dispatched only AFTER the operator /
# maintainer has approved the PR (the operator is the trust gate). Its
# permissions are scoped to GHCR push (`contents: read` + `packages: write`) —
# NO deploy/infra/promote secrets, NO write to the repo, NO env access. The fork
# code runs in `docker buildx` exactly as the same-repo path runs it; the only
# elevation vs the fork's own `pull_request` run is a GHCR-push token, which is
# the whole point. The same-repo `pull_request` build path (`pr-build.yml`) is
# untouched.
#
# Operator-dispatch follow-on: the operator GitHub App (actions:write) should
# expose a thin method that dispatches THIS workflow with {pr_number, head_repo,
# head_sha} after RBAC-gated approval, so flock-leader triggers it via the authed
# API with zero GitHub perms. That wiring is a separate PR (one concern each);
# candidate-flight is then dispatched unchanged once images exist.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Fork PR number (in the base repo)"
        required: true
        type: string
      head_repo:
        description: "Fork head repo, owner/name (e.g. flock-leader/cogni)"
        required: true
        type: string
      head_sha:
        description: "Fork PR head SHA (40-char hex) — the tree that gets built"
        required: true
        type: string

# GHCR push only. No deploy/infra/promote scope — fork code never sees a secret
# beyond the packages-write token.
permissions:
  contents: read
  packages: write

concurrency:
  group: fork-pr-build-${{ inputs.pr_number }}-${{ inputs.head_sha }}
  cancel-in-progress: true

env:
  # FORK_FREEDOM: owner-derived so the base-repo dispatch pushes to the BASE
  # owner's GHCR namespace — exactly where candidate-flight.yml's resolve step
  # looks (`ghcr.io/${{ github.repository_owner }}/cogni-template`). Mirrors
  # pr-build.yml.
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/cogni-template

jobs:
  # Validate inputs + compute the canonical pr-{N}-{sha} tag once. Mirrors
  # pr-build.yml's `resolve` outputs so the downstream jobs are identical in
  # shape; the only difference is the source ref is the fork's {head_repo}@{sha}.
  resolve:
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.r.outputs.pr_number }}
      head_repo: ${{ steps.r.outputs.head_repo }}
      head_sha: ${{ steps.r.outputs.head_sha }}
      image_tag: ${{ steps.r.outputs.image_tag }}
    steps:
      - id: r
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          HEAD_REPO: ${{ inputs.head_repo }}
          HEAD_SHA: ${{ inputs.head_sha }}
        run: |
          set -euo pipefail
          if [[ ! "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "::error::pr_number must be numeric (got: $PR_NUMBER)"
            exit 1
          fi
          if [[ ! "$HEAD_REPO" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
            echo "::error::head_repo must be owner/name (got: $HEAD_REPO)"
            exit 1
          fi
          if [[ ! "$HEAD_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "::error::head_sha must be a 40-char hex SHA (got: $HEAD_SHA)"
            exit 1
          fi
          # IMMUTABLE pr-{N}-{sha} tag — identical convention to pr-build.yml so
          # candidate-flight.yml resolves it with no contract change.
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head_repo=$HEAD_REPO" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "image_tag=pr-${PR_NUMBER}-${HEAD_SHA}" >> "$GITHUB_OUTPUT"

  detect:
    needs: resolve
    runs-on: ubuntu-latest
    outputs:
      has_targets: ${{ steps.detect.outputs.has_targets }}
      targets_json: ${{ steps.detect.outputs.targets_json }}
      targets_csv: ${{ steps.detect.outputs.targets }}
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          repository: ${{ needs.resolve.outputs.head_repo }}
          ref: ${{ needs.resolve.outputs.head_sha }}
          fetch-depth: 0

      # Authoritative changed-paths via the base-repo PR `files` API (same source
      # pr-build.yml + candidate-flight use). The PR lives in the base repo even
      # though its head is on the fork, so this query needs the base-repo token.
      - id: pr-files
        name: Fetch PR changed-paths from GitHub API
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
          OUT: ${{ runner.temp }}/pr-changed-paths.txt
        run: |
          set -euo pipefail
          gh api --paginate "repos/${{ github.repository }}/pulls/${PR_NUMBER}/files" \
            --jq '.[] | (.filename, .previous_filename) | select(. != null)' > "$OUT"
          COUNT=$(wc -l < "$OUT" | tr -d ' ')
          echo "ℹ️  PR #${PR_NUMBER} changed ${COUNT} path(s) (per GitHub API)"
          echo "changed_paths_file=$OUT" >> "$GITHUB_OUTPUT"

      - name: Detect affected image targets
        id: detect
        env:
          CHANGED_PATHS_FILE: ${{ steps.pr-files.outputs.changed_paths_file }}
        run: bash scripts/ci/detect-affected.sh

  build:
    needs: [resolve, detect]
    if: needs.detect.outputs.has_targets == 'true'
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ needs.resolve.outputs.image_tag }}
      PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
      HEAD_SHA: ${{ needs.resolve.outputs.head_sha }}
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.detect.outputs.targets_json) }}
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          repository: ${{ needs.resolve.outputs.head_repo }}
          ref: ${{ needs.resolve.outputs.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.target }}
        env:
          TARGETS: ${{ matrix.target }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # BUILD_SHA = the fork PR head SHA, baked into /version.buildSha — same
          # contract as pr-build.yml so verify-buildsha matches after flight.
          BUILD_SHA: ${{ needs.resolve.outputs.head_sha }}
          OUTPUT_FILE: ${{ runner.temp }}/build-fragment-${{ matrix.target }}.json
        run: bash scripts/ci/build-and-push-images.sh

      - name: Upload build fragment
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: fork-pr-build-fragment-${{ matrix.target }}-${{ needs.resolve.outputs.pr_number }}-${{ needs.resolve.outputs.head_sha }}
          path: ${{ runner.temp }}/build-fragment-${{ matrix.target }}.json
          retention-days: 1
          if-no-files-found: error
          overwrite: true

  manifest:
    needs: [resolve, detect, build]
    if: |
      always() &&
      needs.detect.result == 'success' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ needs.resolve.outputs.image_tag }}
      PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
      HEAD_SHA: ${{ needs.resolve.outputs.head_sha }}
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          repository: ${{ needs.resolve.outputs.head_repo }}
          ref: ${{ needs.resolve.outputs.head_sha }}

      - name: Download build fragments
        if: needs.detect.outputs.has_targets == 'true'
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/build-fragments
          pattern: fork-pr-build-fragment-*-${{ needs.resolve.outputs.pr_number }}-${{ needs.resolve.outputs.head_sha }}
          merge-multiple: true

      - name: Merge fragments into build-images.json
        env:
          FRAGMENTS_DIR: ${{ runner.temp }}/build-fragments
          OUTPUT_FILE: ${{ runner.temp }}/build-images.json
        run: bash scripts/ci/merge-build-fragments.sh

      - name: Write build manifest
        env:
          IMAGES_FILE: ${{ runner.temp }}/build-images.json
          MANIFEST_FILE: ${{ runner.temp }}/build-manifest.json
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          WORKFLOW_NAME: ${{ github.workflow }}
          REF_NAME: ${{ needs.resolve.outputs.head_sha }}
        run: bash scripts/ci/write-build-manifest.sh

      - name: Upload build manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: build-manifest-pr-${{ needs.resolve.outputs.pr_number }}-${{ needs.resolve.outputs.head_sha }}
          path: ${{ runner.temp }}/build-manifest.json
          retention-days: 7
          if-no-files-found: error
          overwrite: true
