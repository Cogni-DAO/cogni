name: Verify Multi-Node Deployment

# Triggered after overlay promotion. Polls node health endpoints on the
# k3s staging VM until all nodes respond, then runs a smoke test.
# On failure: SSH kubectl for diagnostics.

on:
  workflow_run:
    workflows: ["Promote k8s Staging Overlays"]
    types: [completed]
    branches: [integration/multi-node]

permissions:
  contents: read
  actions: read

concurrency:
  group: verify-deployment
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: integration
    env:
      VM_HOST: ${{ secrets.VM_HOST }}
      OPERATOR_URL: https://test.cognidao.org
      POLY_URL: https://poly-test.cognidao.org
      RESY_URL: https://resy-test.cognidao.org
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Argo CD sync + pod startup
        run: |
          echo "Waiting 90s for Argo CD poll interval + pod startup..."
          sleep 90

      - name: Poll health endpoints
        run: |
          MAX_ATTEMPTS=20
          SLEEP=15

          poll_health() {
            local name="$1"
            local url="$2"
            local attempt=1

            echo "Polling $name at $url/readyz ..."
            while [ $attempt -le $MAX_ATTEMPTS ]; do
              STATUS=$(curl -sk -o /dev/null -w '%{http_code}' "$url/readyz" 2>/dev/null || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "✅ $name healthy (attempt $attempt)"
                return 0
              fi
              echo "  $name: HTTP $STATUS (attempt $attempt/$MAX_ATTEMPTS)"
              sleep $SLEEP
              attempt=$((attempt + 1))
            done
            echo "❌ $name failed health check after $MAX_ATTEMPTS attempts"
            return 1
          }

          FAILED=0
          poll_health "operator" "$OPERATOR_URL" || FAILED=1
          poll_health "poly" "$POLY_URL" || FAILED=1
          poll_health "resy" "$RESY_URL" || FAILED=1

          if [ $FAILED -ne 0 ]; then
            echo "❌ One or more nodes failed health checks"
            exit 1
          fi
          echo "✅ All nodes healthy"

      - name: Smoke test — verify app responds
        run: |
          # Hit /livez (unauthenticated, fast) to prove the app process is running
          # and not just the readiness probe passing with a stale container
          for url in "$OPERATOR_URL" "$POLY_URL" "$RESY_URL"; do
            BODY=$(curl -sk "$url/livez" 2>/dev/null)
            echo "$url/livez → $BODY"
            if ! echo "$BODY" | grep -q '"status"'; then
              echo "❌ Smoke test failed: $url/livez did not return expected JSON"
              exit 1
            fi
          done

          # Hit /version to prove the correct SHA is deployed
          SHA="${{ github.event.workflow_run.head_sha }}"
          SHORT_SHA=$(echo "$SHA" | cut -c1-8)
          for url in "$OPERATOR_URL" "$POLY_URL" "$RESY_URL"; do
            VERSION=$(curl -sk "$url/version" 2>/dev/null || echo "{}")
            echo "$url/version → $VERSION"
          done

          echo "✅ Smoke tests passed"

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          if [ -z "$VM_HOST" ]; then
            echo "No VM_HOST configured — cannot SSH for diagnostics"
            exit 0
          fi

          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.SSH_DEPLOY_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 10 -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10"

          echo "=== Argo CD Application Status ==="
          ssh $SSH_OPTS root@"$VM_HOST" "kubectl -n argocd get applications -o wide" 2>&1 || true

          echo ""
          echo "=== Pod Status ==="
          ssh $SSH_OPTS root@"$VM_HOST" "kubectl -n cogni-staging get pods -o wide" 2>&1 || true

          echo ""
          echo "=== Recent Events ==="
          ssh $SSH_OPTS root@"$VM_HOST" "kubectl -n cogni-staging get events --sort-by=.lastTimestamp | tail -20" 2>&1 || true

          echo ""
          echo "=== Pod Logs (last 30 lines each) ==="
          for app in operator poly resy; do
            echo "--- $app ---"
            ssh $SSH_OPTS root@"$VM_HOST" "kubectl -n cogni-staging logs -l app.kubernetes.io/name=node-app --prefix --tail=30 -c app 2>&1 | grep -i '$app' | head -30" 2>&1 || true
          done
